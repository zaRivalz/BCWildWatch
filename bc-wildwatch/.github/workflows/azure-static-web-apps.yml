name: Deploy BC WildWatch to Azure Static Web Apps

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  # ── Build & Deploy ──────────────────────────────────────────────────────────
  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    # Skip deploy on closed PRs (cleanup is handled by the close_pr job below)
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Set up Node.js for API
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bc-wildwatch/api/package.json

      - name: Install API dependencies
        working-directory: bc-wildwatch/api
        run: npm ci --omit=dev

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token:                      ${{ secrets.GITHUB_TOKEN }}
          action:                          upload

          # ── Paths ────────────────────────────────────────────────────────────
          # Static files are served from bc-wildwatch/public/
          app_location:    bc-wildwatch/public

          # SWA Managed Functions live in bc-wildwatch/api/
          api_location:    bc-wildwatch/api

          # No build output directory (pure static — no build step)
          output_location: ''

          # ── Config ───────────────────────────────────────────────────────────
          # staticwebapp.config.json is picked up automatically from app_location
          # or the repo root. Place it at bc-wildwatch/staticwebapp.config.json
          # and SWA will find it.

  # ── Close PR staging environment ───────────────────────────────────────────
  close_pr_environment:
    name: Close Pull Request Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action:                          close
          app_location:                    bc-wildwatch/public
